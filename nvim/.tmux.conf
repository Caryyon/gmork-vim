# Gmork tmux theme - Inspired by the black wolf from The Neverending Story
# A dark, atmospheric theme with luminous green eyes in blue-black darkness
# Author: Claude Code
# Version: 3.0
#
# Palette Philosophy:
# - Backgrounds: Blue-black tones (Gmork's fur)
# - Primary accent: Luminous green (Gmork's glowing eyes)
# - Secondary accent: Storm purple (The Nothing)
# - Danger: Blood crimson (not neon)
# - Text: Bone/fang white (slightly warm)

# === BACKGROUNDS (Gmork's Blue-Black Fur) ===
VOID="#0a0a12"              # Deepest blue-black
SHADOW="#12121a"            # Dark blue-black
CAVE="#1c1c26"              # Cave darkness
CAVE_STONE="#2a2a36"        # Lighter cave
STONE="#3f3f4a"             # Cave stone highlight

# === GMORK'S EYES (Primary Accent - Luminous Green) ===
EYE_GLOW="#3edd78"          # Main luminous green
EYE_SHINE="#4ade80"         # Brighter eye shine
EYE_DIM="#166534"           # Dim glow in darkness

# === THE NOTHING (Storm & Void - Purple) ===
STORM="#2d1b4e"             # Dark storm clouds
VOID_PURPLE="#4c1d95"       # The Nothing's void
LIGHTNING="#7c3aed"         # Lightning flash
LIGHTNING_BRIGHT="#a78bfa"  # Bright lightning

# === BLOOD & DANGER (Crimson, not neon) ===
BLOOD="#dc2626"             # Blood crimson
WOUND="#991b1b"             # Darker wound
EMBER="#ea580c"             # Ember orange
EMBER_BRIGHT="#f97316"      # Bright ember

# === BONE & MIST (Text colors) ===
FANG="#f4f4f5"              # Fang white (main text)
BONE="#d4d4d8"              # Bone (secondary text)
MIST="#a1a1aa"              # Mist gray
FOG="#71717a"               # Fog (dimmed)

# === EARTH & CAVE ===
ROOT="#78350f"              # Cave roots (brown)
MOSS="#365314"              # Cave moss

# Set tmux to display in 256 colors with undercurl support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
# Undercurl support (for LSP diagnostics in nvim)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# System clipboard integration (OSC 52)
set -g set-clipboard external

set-option -g focus-events on

# Set border colors - Gmork theme
set-option -g pane-border-style "fg=$CAVE_STONE"
set-option -g pane-active-border-style "fg=$EYE_GLOW"

# Set status line message style - Gmork theme
set -g message-style "fg=$FANG,bg=$CAVE"
set -g message-command-style "fg=$FANG,bg=$CAVE"

# Set mode style (including history bar) - Gmork theme
set -g mode-style "fg=$VOID,bg=$EYE_SHINE"

# Enable status bar
set-option -g status on

# Set window list to center
set -g status-justify left

# Gmork theme status bar
set-option -g status-style "bg=$SHADOW,fg=$FANG"
set-option -g status-left-length 50
set-option -g status-right-length 250

# Status bar left side - Gmork's eyes glow when active
set-option -g status-left "#[bg=$EYE_GLOW,fg=$VOID,bold] #S #[bg=$SHADOW,fg=$EYE_GLOW]#{?client_prefix, ⚡,}#[fg=$LIGHTNING]#{?window_zoomed_flag, 󰍉 ,} "

# Status bar right side - Gmork's cave with glowing eyes
set -g status-right "#[fg=$CAVE_STONE]#[bg=$CAVE_STONE,fg=$MIST] #(whoami)@#h #[fg=$CAVE,bg=$CAVE_STONE]#[bg=$CAVE,fg=$EYE_SHINE] #(tmux display-message -p '#{pane_current_path}' | sed 's|.*/||') #[fg=$EYE_GLOW]⎇#(cd #{pane_current_path}; git branch --show-current 2>/dev/null | head -c 10) #[fg=$EMBER]%H:%M #[fg=$EYE_GLOW]%d %b #[fg=$EYE_GLOW]⚡#(uptime | awk '{print $3}' | sed 's/,//')"

# Window status (Gmork theme)
set-window-option -g window-status-style "bg=$SHADOW,fg=$MIST"
set-window-option -g window-status-current-style "bg=$EYE_GLOW,fg=$VOID,bold"
set-window-option -g window-status-activity-style "bg=$EYE_SHINE,fg=$VOID"
set-window-option -g window-status-bell-style "bg=$BLOOD,fg=$VOID"

# Window status format - Gmork's glowing eyes in darkness
set-window-option -g window-status-format "#[bg=$CAVE_STONE,fg=$MIST] #I #[bg=$CAVE_STONE,fg=$BONE]#W#F #[bg=$SHADOW,fg=$CAVE_STONE]"
set-window-option -g window-status-current-format "#[bg=$EYE_SHINE,fg=$VOID,bold] #I #[bg=$EYE_SHINE,fg=$VOID]#W#F "

# Start windows numbering at 1
set -g base-index 1

# Start pane numbering at 1
setw -g pane-base-index 1

# Re-draw status window every 5 seconds
set -g status-interval 5

# set scrollback history to 10000 (10k)
set -g history-limit 10000

# enable scroll with mouse
set -g mouse on

# shorten command delay
set -sg escape-time 1

# visual notification of activity in other windows
setw -g monitor-activity on
set -g visual-activity on

# Automatically renumber windows when one is closed
set-option -g renumber-windows on

# Automatically rename windows based on current directory/program
set-window-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'
set-option -g allow-rename off

# Vi mode configuration
# Enable vi mode for copy mode
set-window-option -g mode-keys vi

# Copy mode key bindings (vim-style)
# Enter copy mode with prefix + [
# Exit copy mode with q or Escape

# Visual selection and copy bindings
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'V' send-keys -X select-line
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle

# Cross-platform clipboard support
# macOS: uses pbcopy
# Linux with X11: uses xclip
# Linux with Wayland: uses wl-copy
# Falls back to OSC 52 for remote/SSH sessions
if-shell "uname | grep -q Darwin" {
  bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
}
if-shell "uname | grep -q Linux && command -v xclip" {
  bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
}
if-shell "uname | grep -q Linux && command -v wl-copy" {
  bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "wl-copy"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
}

# Vim-style find functionality in copy mode
bind-key -T copy-mode-vi 'f' command-prompt -1 "send -X jump-forward '%%'"
bind-key -T copy-mode-vi 'F' command-prompt -1 "send -X jump-backward '%%'"
bind-key -T copy-mode-vi 't' command-prompt -1 "send -X jump-to-forward '%%'"
bind-key -T copy-mode-vi 'T' command-prompt -1 "send -X jump-to-backward '%%'"
bind-key -T copy-mode-vi ';' send-keys -X jump-again
bind-key -T copy-mode-vi ',' send-keys -X jump-reverse

# Search bindings
bind-key -T copy-mode-vi '/' command-prompt -p "(search down)" "send -X search-forward '%%'"
bind-key -T copy-mode-vi '?' command-prompt -p "(search up)" "send -X search-backward '%%'"
bind-key -T copy-mode-vi 'n' send-keys -X search-again
bind-key -T copy-mode-vi 'N' send-keys -X search-reverse

# Movement keys
bind-key -T copy-mode-vi 'h' send-keys -X cursor-left
bind-key -T copy-mode-vi 'j' send-keys -X cursor-down
bind-key -T copy-mode-vi 'k' send-keys -X cursor-up
bind-key -T copy-mode-vi 'l' send-keys -X cursor-right
bind-key -T copy-mode-vi 'w' send-keys -X next-word
bind-key -T copy-mode-vi 'b' send-keys -X previous-word
bind-key -T copy-mode-vi 'e' send-keys -X next-word-end
bind-key -T copy-mode-vi '0' send-keys -X start-of-line
bind-key -T copy-mode-vi '$' send-keys -X end-of-line
bind-key -T copy-mode-vi '^' send-keys -X back-to-indentation
bind-key -T copy-mode-vi 'g' send-keys -X history-top
bind-key -T copy-mode-vi 'G' send-keys -X history-bottom
bind-key -T copy-mode-vi 'H' send-keys -X top-line
bind-key -T copy-mode-vi 'L' send-keys -X bottom-line
bind-key -T copy-mode-vi 'M' send-keys -X middle-line

# Page navigation
bind-key -T copy-mode-vi 'C-f' send-keys -X page-down
bind-key -T copy-mode-vi 'C-b' send-keys -X page-up
bind-key -T copy-mode-vi 'C-d' send-keys -X halfpage-down
bind-key -T copy-mode-vi 'C-u' send-keys -X halfpage-up

# Exit copy mode
bind-key -T copy-mode-vi 'q' send-keys -X cancel
bind-key -T copy-mode-vi 'Escape' send-keys -X cancel

# Key bindings
# Prefix key setup
set -g prefix C-a
unbind C-b
# use send-prefix to pass C-a through to application
bind C-a send-prefix

# reload ~/.tmux.conf using PREFIX r
bind r source-file ~/.tmux.conf \; display "tmux.conf source"

# Bind <prefix>- to split window horizontally
bind - split-window -v

# Bind <prefix>| to split window vertically
bind | split-window -h

# Map vim movement keys as pane movement keys with prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes using PREFIX H, J, K, L (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Increase repeat-time for easier resizing (default 500ms)
set -g repeat-time 1000

# start new pane in same directory location
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ==========================================
# Plugins
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'      # Sensible defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-yank'          # Better clipboard
set -g @plugin 'christoomey/vim-tmux-navigator'  # Seamless vim/tmux navigation
set -g @plugin 'fcsonline/tmux-thumbs'           # Quick copy text on screen
set -g @plugin 'sainnhe/tmux-fzf'                # Fuzzy finder for sessions/windows

# tmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Additional resurrect settings for better session restoration
set -g @resurrect-save-shell-history 'off'
set -g @resurrect-processes 'ssh psql mysql sqlite3 "~yarn dev" "~npm start" "~npm run dev"'

# Save and restore vim/nvim sessions with vim-obsession
set -g @resurrect-save-command-strategy 'cmdline'
set -g @resurrect-hook-pre-restore-pane-processes 'tmux switch-client -n && tmux kill-session -t=0'

# tmux-continuum for automatic saves/restores
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-yank settings
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe'

# tmux-thumbs settings (press prefix + Space to activate)
set -g @thumbs-key Space
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-bg-color black
set -g @thumbs-fg-color green
set -g @thumbs-hint-fg-color yellow
set -g @thumbs-contrast 1

# tmux-fzf settings
TMUX_FZF_LAUNCH_KEY="f"
set -g @tmux-fzf-launch-key "f"

# Key bindings for resurrect
# prefix + Ctrl-s - save
# prefix + Ctrl-r - restore

# Additional session management bindings
bind S run-shell "~/.tmux/plugins/tmux-resurrect/scripts/save.sh && tmux display-message 'Session saved!'"
bind R run-shell "~/.tmux/plugins/tmux-resurrect/scripts/restore.sh && tmux display-message 'Session restored!'"
bind C command-prompt -p "Create session:" "new-session -s '%%'"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# ==========================================
# Additional Popular Keybindings
# ==========================================

# Quick window switching with Alt+number (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Quick window navigation (no prefix needed)
bind -n M-h previous-window
bind -n M-l next-window

# Swap windows left/right
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# Toggle synchronize-panes (type in all panes at once)
bind y setw synchronize-panes\; display-message "synchronize-panes #{?pane_synchronized,on,off}"

# Quick pane zoom toggle
bind z resize-pane -Z

# Break pane into new window
bind b break-pane

# Join pane from another window
bind @ command-prompt -p "Join pane from:" "join-pane -s '%%'"

# Swap panes
bind -r { swap-pane -U
bind -r } swap-pane -D

# Rotate panes
bind -r o rotate-window

# Clear screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.1' \; clear-history

# Quick session switching
bind s choose-tree -sZ
bind w choose-tree -wZ

# Create new window in current directory
bind c new-window -c "#{pane_current_path}"

# Kill pane without confirmation
bind x kill-pane

# Layouts
bind -r Space next-layout
bind = select-layout even-horizontal
bind + select-layout even-vertical

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'